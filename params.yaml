titanic:
  data:
    raw_path: data/raw
    processed_path: data/processed
    file_name: train
    target_column: Survived

  split:
    test_size: 0.7
    random_state: 48

  model:
    logistic:
      max_iter: 81
      C: 0.5

    random_forest:
      random_state: 42
      n_estimators: 9
      max_depth: 11
      min_samples_split: 4
      min_samples_leaf: 10

  output:
    model_path: models/best_model.pkl
    metrics_path: reports/metrics.json


titanic2:
  data:
    raw_path: data/raw
    processed_path: data/processed
    file_name: train
    target_column: Survived

  split:
    test_size: 0.2
    random_state: 11

  model:
    logistic:
      max_iter: 500
      C: 0.5

    random_forest:
      random_state: 12
      n_estimators: 10
      max_depth: 10
      min_samples_split: 4
      min_samples_leaf: 5

  output:
    model_path: models/best_model2.pkl
    metrics_path: reports/metrics2.json